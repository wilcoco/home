<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="㈜캠스 Selfservice — 외부 시스템으로 이동합니다">
<title>Selfservice | ㈜캠스</title>
<meta http-equiv="refresh" content="2;url=https://selfservice.icams.co.kr/">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
<style>
  body {
    display: flex;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .redirect-card {
    text-align: center;
    max-width: 440px;
    padding: 48px 36px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    box-shadow: 0 10px 40px rgba(0,0,0,0.06);
  }
  .redirect-card .label {
    font-family: var(--font-en);
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .redirect-card h1 {
    font-size: 1.5rem;
    margin-bottom: 14px;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .redirect-card p {
    color: var(--text-secondary);
    margin-bottom: 24px;
    line-height: 1.6;
    font-size: 0.92rem;
  }
  .redirect-card .target {
    display: inline-block;
    padding: 10px 18px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    font-family: var(--font-en);
    font-size: 0.85rem;
    color: var(--accent);
    margin-bottom: 28px;
    word-break: break-all;
  }
  .redirect-card a.btn-go {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 13px 26px;
    background: var(--accent);
    color: white;
    border-radius: var(--radius);
    font-weight: 600;
    text-decoration: none;
    transition: background 0.2s;
  }
  .redirect-card a.btn-go:hover { background: var(--accent-soft); }
  .redirect-card .home-link {
    display: block;
    margin-top: 18px;
    font-size: 0.82rem;
    color: var(--text-muted);
    text-decoration: none;
  }
  .redirect-card .home-link:hover { color: var(--accent); }
  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 18px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="redirect-card">
    <div class="spinner"></div>
    <div class="label">Redirecting</div>
    <h1>Selfservice 시스템으로 이동합니다</h1>
    <p>잠시만 기다려 주세요. 자동으로 이동되지 않으면 아래 버튼을 클릭해 주세요.</p>
    <div class="target">selfservice.icams.co.kr</div>
    <br>
    <a class="btn-go" href="https://selfservice.icams.co.kr/" rel="noopener">Selfservice 바로가기 →</a>
    <a class="home-link" href="/">← ㈜캠스 홈으로 돌아가기</a>
  </div>
</body>
</html>
